<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agents-md</title>
  <style>
    body{font-family:Inter,system-ui,Arial,sans-serif;margin:0;background:#0b1020;color:#e8ecff}
    .wrap{max-width:860px;margin:60px auto;padding:0 20px}
    .card{background:#121a33;border:1px solid #26335f;border-radius:14px;padding:24px}
    a{color:#8fb3ff}
    code{background:#0d1430;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>agents-md</h1>
      <p>A practical template and workflow guide for autonomous coding projects.</p>
      <h3>Quick start</h3>
      <ul>
        <li><code>agents-md init &lt;project-name&gt;</code></li>
        <li><code>agents-md requirements lint</code></li>
        <li><code>agents-md finalize --push --public</code></li>
      </ul>
      <p>Repository: <a href="https://github.com/trace-code-org/agents-md">trace-code-org/agents-md</a></p>
    </div>
  </div>
</body>
</html>
